apiVersion: apps/v1
kind: Deployment
metadata: { name: policyforge, labels: { app: policyforge } }
spec:
  replicas: 1
  selector: { matchLabels: { app: policyforge } }
  template:
    metadata: { labels: { app: policyforge } }
    spec:
      containers:
        - name: policyforge
          image: ghcr.io/cognis-digital/policyforge:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: policyforge }
spec:
  selector: { app: policyforge }
  ports: [{ port: 80, targetPort: 8000 }]
